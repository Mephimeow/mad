name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ make
    
    - name: Build
      run: |
        make clean
        make
    
    - name: Run basic test
      run: |
        timeout 5 ./scanner 127.0.0.1 -p 80 || true
        echo "Build successful"
